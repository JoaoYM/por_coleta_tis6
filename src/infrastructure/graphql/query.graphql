# Busca repositórios pela linguagem, estrelas e data de push
query($queryString: String!, $cursor: String) {
  search(query: $queryString, type: REPOSITORY, first: 20, after: $cursor) {
    pageInfo {
      endCursor
      hasNextPage
    }
    edges {
      node {
        ... on Repository {
          nameWithOwner # Nome completo (owner/repo) para chamadas futuras
          url
          stargazerCount
          createdAt
          pushedAt
          # OTIMIZAÇÃO: Conta apenas os Pull Requests que foram MESCLADOS (Merged)
          pullRequests(states: [MERGED]) {
            totalCount
          }
          # Pega uma amostra de colaboradores para checar se tem >= 50
          mentionableUsers(first: 1) {
            totalCount
          }
        }
      }
    }
  }
}